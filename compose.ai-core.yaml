# ⚠️ ALIAS DE COMPATIBILIDAD — NO EDITAR AQUÍ.
# La fuente de verdad es compose.yaml. Este archivo existe solo porque Dokploy
# todavía apunta su "Compose Path" a ./compose.ai-core.yaml. Mantiene el deploy
# funcionando con la arquitectura nueva (doppel-api + Pydantic AI in-process + Postgres)
# sin tener que cambiar el campo en el panel.
# Si cambias el Compose Path a ./compose.yaml en Dokploy, borra este archivo.
# Cualquier cambio real va en compose.yaml y luego se copia aquí.
services:
  doppel-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doppel-api
    env_file:
      - .env
    environment:
      # Postgres dedicado para el historial de conversaciones del bot (Pydantic AI).
      CHAT_DB_URL: postgresql://ai:ai@chat-postgres:5432/chat
      # Flag de "bot activado": cualquier valor no vacío activa el bot.
      AI_CORE_URL: enabled
    depends_on:
      chat-postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  chat-postgres:
    image: postgres:17
    container_name: chat-postgres
    environment:
      POSTGRES_DB: chat
      POSTGRES_USER: ai
      POSTGRES_PASSWORD: ai
    volumes:
      - chat-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai -d chat"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  chat-postgres-data:
