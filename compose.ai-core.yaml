services:
  doppel-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doppel-api
    env_file:
      - .env
    environment:
      AI_CORE_URL: http://ai-core:8000
    depends_on:
      ai-core:
        condition: service_started
    ports:
      - "8000:8000"
    restart: unless-stopped

  ai-core:
    build:
      context: .
      dockerfile: Dockerfile.ai-core
    container_name: ai-core
    env_file:
      - .env
    environment:
      DOPPEL_API_URL: http://doppel-api:8000
      AI_CORE_DB_URL: postgresql://ai:ai@ai-core-postgres:5432/ai_core
    depends_on:
      ai-core-postgres:
        condition: service_healthy
    ports:
      - "8010:8000"
    restart: unless-stopped

  ai-core-postgres:
    image: pgvector/pgvector:pg17
    container_name: ai-core-postgres
    environment:
      POSTGRES_DB: ai_core
      POSTGRES_USER: ai
      POSTGRES_PASSWORD: ai
    volumes:
      - ai-core-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai -d ai_core"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ai-core-postgres-data:
